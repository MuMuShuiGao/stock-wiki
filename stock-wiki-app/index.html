<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Wiki</title>
    <style>
      /* ── Dark defaults (shown BEFORE React mounts) ── */
      html, body, #root {
        margin: 0;
        height: 100%;
        background: #1e1e2e;
      }
      #app-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        font-family: system-ui, -apple-system, sans-serif;
        color: #a0aec0;
        background: #1e1e2e;
      }
      #app-loader .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #3d3d5c;
        border-top-color: #60a5fa;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 12px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #app-loader p {
        font-size: 13px;
        margin: 0;
      }
      /* ── Light mode override (avoids flash on light-theme systems) ── */
      @media (prefers-color-scheme: light) {
        html, body, #root, #app-loader {
          background: #ffffff;
        }
        #app-loader {
          color: #6b7280;
        }
        #app-loader .spinner {
          border-color: #e5e7eb;
          border-top-color: #3b82f6;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Shown instantly, replaced when React mounts -->
      <div id="app-loader">
        <div class="spinner"></div>
        <p>Stock Wiki</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
